version: "3.9"

# Usage:
#   Standard:          docker-compose --env-file docker/.env up
#   With Langfuse:     docker-compose --env-file docker/.env --profile langfuse up
#   API only:          docker-compose --env-file docker/.env up api qdrant postgres

services:

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: uro-rag-api
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Service-discovery overrides (Docker internal hostnames)
      QDRANT_URL: http://qdrant:6333
      POSTGRES_URL: postgresql+asyncpg://rag:rag@postgres:5432/rag
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data        # ingestion outputs, eval results, metadata cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 600s
      retries: 3
    networks:
      - rag-net

  # ── Streamlit UI ──────────────────────────────────────────────────────────────
  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: uro-rag-ui
    depends_on:
      api:
        condition: service_healthy
    env_file: .env
    environment:
      API_BACKEND_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ../rag_ui.py:/app/rag_ui.py   # hot-reload UI during development
    command:
      - streamlit
      - run
      - rag_ui.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
    restart: unless-stopped
    networks:
      - rag-net

  # ── Qdrant vector store ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: uro-rag-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-net

  # ── PostgreSQL — document store, BM25, audit log ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: uro-rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-net

  # ── Weekly incremental ingestion ─────────────────────────────────────────────
  #
  # Runs every Sunday at 02:00 UTC. Fetches papers published since the previous
  # Sunday and adds them to Qdrant + checkpoints. Uses ofelia as a Docker-native
  # cron scheduler (no host crontab needed).
  #
  # Start with:  docker-compose --profile ingestion-cron up
  ingestion-cron:
    image: mcuadros/ofelia:latest
    container_name: uro-rag-ingestion-cron
    profiles: [ingestion-cron]
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --docker
    labels:
      # ── Step 1 (01:00 UTC): refresh regulatory withdrawal database ────────────
      # Runs 1 hour before ingestion so any newly withdrawn drugs are flagged
      # in answers produced after the Sunday 08:00 UTC API restart.
      ofelia.job-run.regulatory-db-update.schedule: "0 1 * * 0"   # Sunday 01:00 UTC
      ofelia.job-run.regulatory-db-update.container: "uro-rag-api"
      ofelia.job-run.regulatory-db-update.command: >
        python scripts/update_regulatory_db.py

      # ── Step 2 (02:00 UTC): incremental paper ingestion ───────────────────────
      ofelia.job-run.weekly-ingestion.schedule: "0 2 * * 0"   # Sunday 02:00 UTC
      ofelia.job-run.weekly-ingestion.container: "uro-rag-api"
      ofelia.job-run.weekly-ingestion.command: >
        python -m src.ingestion.pipeline
        --mode incremental
        --since-date $(date -d '7 days ago' +%Y/%m/%d)
        --limit 2000

      # ── Step 3 (08:00 UTC): restart API to reload BM25 cache + new reg. data ──
      ofelia.job-local.restart-api-after-ingestion.schedule: "0 8 * * 0"   # Sunday 08:00 UTC
      ofelia.job-local.restart-api-after-ingestion.command: >
        curl -sf --unix-socket /var/run/docker.sock
        -X POST http://localhost/v1.41/containers/uro-rag-api/restart
    restart: unless-stopped
    networks:
      - rag-net

  # ── Langfuse — self-hosted distributed tracing (optional profile) ─────────────
  #
  # Start with:  docker-compose --profile langfuse up
  # Then set LANGFUSE_HOST=http://langfuse:3000 in docker/.env
  # UI available at:  http://localhost:3000
  langfuse:
    image: langfuse/langfuse:2
    container_name: uro-rag-langfuse
    profiles: [langfuse]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-in-production}
      SALT: ${LANGFUSE_SALT:-changeme-in-production}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - rag-net

volumes:
  qdrant_storage:
    driver: local
  postgres_data:
    driver: local

networks:
  rag-net:
    driver: bridge
