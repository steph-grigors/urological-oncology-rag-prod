version: "3.9"

services:

  # ── RAG API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: uro-rag-api
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data        # ingestion outputs, eval results, cache
    restart: unless-stopped
    networks:
      - rag-net

  # ── Streamlit UI (legacy, calls API) ─────────────────────────────────────
  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: uro-rag-ui
    depends_on:
      - api
    env_file: .env
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "rag_ui.py", "--server.port", "8501",
              "--server.address", "0.0.0.0"]
    volumes:
      - ../rag_ui.py:/app/rag_ui.py
      - ../src:/app/src
    restart: unless-stopped
    networks:
      - rag-net

  # ── Qdrant vector store ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: uro-rag-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-net

  # ── Postgres (document store, BM25, audit log) ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: uro-rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-net

volumes:
  qdrant_storage:
  postgres_data:

networks:
  rag-net:
    driver: bridge
